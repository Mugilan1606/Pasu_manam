<!DOCTYPE html>
<html>

<head>
<title>Payment</title>

<link rel="stylesheet" href="/static/css/payment.css">

</head>

<body>

<h2>Select Payment Method</h2>

<br><br>

<!-- ONLINE PAYMENT -->

<a href="/scanner/?name={{name}}&phone={{phone}}&address={{address}}&product={{product}}&quantity={{quantity}}&total={{total}}">
<button>Online Payment</button>
</a>

<br><br>

<!-- CASH ON DELIVERY -->

<a href="/success/?payment=Cash">
<button>Cash On Delivery</button>
</a>



<script>

function cash(){

alert("Order Confirmed!");

var name="{{name}}";
var phone="{{phone}}";
var address="{{address}}";
var product="{{product}}";
var quantity="{{quantity}}";
var total="{{total}}";

var msg =
"🛒 New Order Placed\n\n"+
"👤 Name: "+name+"\n"+
"📞 Phone: "+phone+"\n"+
"📍 Address: "+address+"\n\n"+
"🥛 Product: "+product+" ("+quantity+")\n"+
"💰 Total Amount: ₹"+total+"\n"+
"💳 Payment: Cash On Delivery\n\n"+
"ஆரோக்கியம் உங்கள் வீட்டை தேடி வரும் – பசு மணம்.\n"+
"Health that comes searching for your home – Pasu Manam.";

var url="https://wa.me/916384229507?text="+encodeURIComponent(msg);

window.open(url,"_blank");

window.location.href=
"/success/?name="+name+
"&phone="+phone+
"&address="+address+
"&product="+product+
"&quantity="+quantity+
"&total="+total+
"&payment=Cash";

}

</script>

</body>
</html>
